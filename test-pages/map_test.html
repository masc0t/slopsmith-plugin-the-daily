<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map Render Test</title>
  <style>
    #test { padding: 16px; }
  </style>
</head>
<body>
  <div id="test"></div>
  <div id="output"></div>
  <script src="../../screen.js"></script>
  <script>
    // Lightweight test: render a minimal map and inspect output
    window.addEventListener('DOMContentLoaded', () => {
      const mock = {
        date: '2026-04-26',
        map: {
          nodes: [
            { id: 'n1', type: 'forced', lane: 'standard', col: 0, row: 0, act: 'Intro' },
            { id: 'n2', type: 'rest', lane: 'standard', col: 1, row: 0 },
          ],
          edges: [ { from: 'n1', to: 'n2' } ],
          lanes: { standard: '' }
        },
        songs: [ { cf_id: 1, title: 'Song A', artist: 'Artist', duration: 180 } ],
        available_node_ids: ['n1','n2'],
        cleared_node_ids: [],
        locked_node_ids: []
      };
      const html = dsMapView(mock);
      const out = document.getElementById('output');
      out.innerHTML = html;
      const testOut = document.createElement('pre');
      testOut.textContent = 'Contains lane-standard class: ' + (html.includes('lane-standard') ? 'YES' : 'NO');
      out.appendChild(testOut);
    });
  </script>
</body>
</html>
