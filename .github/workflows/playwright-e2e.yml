name: Playwright E2E (The Daily)

on:
  push:
    branches: [ main, master, '**/*' ]
  pull_request:
    branches: [ '**' ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --silent

      - name: Install Playwright
        run: npm install -D playwright && node node_modules/.bin/playwright install chromium --with-deps

      - name: Run Playwright tests
        run: node node_modules/.bin/playwright test --config ./tests/playwright.config.js
