<div class="max-w-2xl mx-auto px-6 pt-24 pb-16">

    <!-- Loading -->
    <div id="ds-loading" class="flex items-center justify-center py-32">
        <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Setlist view (before completion) -->
    <div id="ds-setlist" class="hidden">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-3">
                    <span id="ds-modifier-icon" class="text-2xl"></span>
                    <span id="ds-modifier-label" class="text-xs font-semibold uppercase tracking-widest text-accent-light px-2 py-0.5 bg-accent/10 rounded-full"></span>
                    <span id="ds-seed" class="text-xs font-mono text-gray-500"></span>
                    <span id="ds-day-number" class="text-xs text-gray-500 font-mono"></span>
                </div>
                <span id="ds-stats" class="text-xs text-gray-500 font-mono"></span>
            </div>
            <div class="text-right">
                <span id="ds-countdown" class="text-xs text-gray-500 font-mono"></span>
            </div>
            <h2 id="ds-day-name" class="text-4xl font-bold text-white mt-2"></h2>
            <p id="ds-date" class="text-sm text-gray-500 mt-1"></p>
            <p id="ds-modifier-desc" class="text-sm text-gray-400 mt-1 italic"></p>
            <p id="ds-fallback-notice" class="hidden text-xs text-yellow-500 mt-2">
                Not enough matching songs in the pool — using full library today.
            </p>
        </div>

        <!-- Progress bar -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-gray-500 uppercase tracking-wider">Progress</span>
                <span id="ds-progress-label" class="text-sm font-semibold text-white"></span>
            </div>
            <div class="h-2 bg-dark-700 rounded-full overflow-hidden">
                <div id="ds-progress-bar" class="h-full bg-accent rounded-full transition-all duration-500 shadow-[0_0_8px_rgba(64,128,224,0.6)]" style="width:0%"></div>
            </div>
        </div>

        <!-- Rescan prompt (shown when songs are missing locally) -->
        <div id="ds-rescan-bar" class="hidden mb-4 flex items-center gap-3 bg-dark-700/40 border border-yellow-700/30 rounded-xl px-4 py-3">
            <div class="flex-1 min-w-0">
                <p class="text-sm text-gray-300">Some songs aren't in your library yet.</p>
                <p id="ds-rescan-status" class="text-xs text-gray-500 mt-0.5">Download the missing CDLC, then rescan to play.</p>
            </div>
            <button id="ds-btn-rescan" onclick="dsRescanLibrary()" class="bg-dark-600 hover:bg-dark-500 px-4 py-2 rounded-xl text-xs text-gray-300 transition flex-shrink-0">Rescan Library</button>
        </div>

        <!-- Song list -->
        <div id="ds-songs" class="space-y-3"></div>
    </div>

<!-- Complete view (with tabs merger) -->
    <div id="ds-complete" class="hidden text-center py-16">
        <div class="text-xs text-gray-500 font-mono mb-2" id="ds-complete-countdown"></div>
        <canvas id="ds-confetti" class="hidden fixed inset-0 pointer-events-none z-50" style="width:100vw;height:100vh;"></canvas>
        <div class="text-6xl mb-4">🎸</div>
        <h2 class="text-4xl font-bold text-white mb-2">Day Complete!</h2>
        <p id="ds-complete-stats" class="text-xl text-accent-light mb-1"></p>
        <p id="ds-complete-name" class="text-xl text-accent-light mb-1"></p>
        <p id="ds-complete-mod" class="text-sm text-gray-400 mb-1"></p>
        <p id="ds-complete-seed" class="text-xs text-gray-600 mb-2"></p>
        <p id="ds-complete-fallback" class="text-xs text-yellow-500 mb-2 hidden"></p>
        <p id="ds-complete-streak" class="text-sm text-gray-400 mb-6"></p>

        <!-- Tab bar -->
        <div class="flex justify-center gap-1 mb-4">
            <button id="ds-tab-today" onclick="dsSwitchTab('today')" class="px-4 py-2 rounded-xl text-sm font-medium transition bg-accent/20 text-accent border border-accent/50">Setlist</button>
            <button id="ds-tab-wof" onclick="dsSwitchTab('wof')" class="px-4 py-2 rounded-xl text-sm font-medium transition bg-dark-700 text-gray-400 border border-gray-700 hover:border-gray-500">Wall of Fame</button>
        </div>

        <!-- Day navigation -->
        <div class="flex justify-center gap-2 mb-4" aria-label="Navigate historical days">
            <button id="ds-prev-day" onclick="dsGoPrevDay()" class="px-3 py-1.5 rounded-xl bg-dark-700 border border-gray-700 hover:border-gray-500 text-xs disabled:opacity-30 disabled:cursor-not-allowed" title="Previous day">
                ◀ Prev Day
            </button>
            <input id="ds-lb-date" type="date" min="2026-04-22" max="" value="" onchange="dsDateChanged(this.value)" oninput="dsDateChanged(this.value)" class="px-2 py-1.5 rounded-xl bg-dark-700 border border-gray-700 text-xs disabled:opacity-50" aria-label="Select date" />
            <button id="ds-next-day" onclick="dsGoNextDay()" class="px-3 py-1.5 rounded-xl bg-dark-700 border border-gray-700 hover:border-gray-500 text-xs disabled:opacity-30 disabled:cursor-not-allowed" title="Next day">
                Next Day ▶
            </button>
        </div>

        <!-- Today tab content -->
        <div id="ds-today-content">
            <div id="ds-complete-setlist" class="space-y-3"></div>
        </div>

        <!-- Wall of Fame tab content -->
        <div id="ds-wof-content" class="hidden">
            <!-- Sign Container -->
            <div id="ds-sign-container" class="hidden max-w-sm mx-auto bg-dark-700/50 border border-gray-800 rounded-xl p-4 mb-6">
                <div class="space-y-3">
                    <input type="text" id="ds-sign-name" placeholder="Your Name" class="w-full bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-accent" maxlength="30" />
                    <input type="text" id="ds-sign-message" placeholder="Leave a comment... (optional)" class="w-full bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent" maxlength="60" />
                    <div class="flex justify-center gap-2 pt-1" id="ds-sign-ratings">
                        <button id="ds-rating--1" onclick="dsSelectRating(-1)" class="p-2 rounded-lg bg-dark-800 border border-gray-700 hover:border-gray-500 transition text-lg" title="Thumbs Down">👎</button>
                        <button id="ds-rating-1" onclick="dsSelectRating(1)" class="p-2 rounded-lg bg-dark-800 border border-gray-700 hover:border-gray-500 transition text-lg" title="Thumbs Up">👍</button>
                        <button id="ds-rating-2" onclick="dsSelectRating(2)" class="p-2 rounded-lg bg-dark-800 border border-gray-700 hover:border-gray-500 transition text-lg" title="Fire">🔥</button>
                    </div>
                    <p id="ds-sign-error" class="hidden text-xs text-red-400 text-center"></p>
                    <button id="ds-btn-sign" onclick="dsSign()" class="w-full bg-accent hover:bg-accent-light text-white font-semibold py-2 rounded-lg text-sm transition">Sign the Wall</button>
                </div>
            </div>

            <div id="ds-lb-ratings" class="hidden flex gap-6 mb-6 text-sm text-gray-400"></div>
            <div id="ds-lb-entries" class="space-y-3"></div>
            <p id="ds-lb-count" class="text-sm text-gray-500 mt-6 text-center"></p>
            <p id="ds-lb-error" class="hidden text-xs text-yellow-500 mt-4 text-center"></p>
        </div>
    </div>

</div>
