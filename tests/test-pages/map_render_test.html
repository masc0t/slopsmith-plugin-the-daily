<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Render Test</title>
  <style>
    .hidden { display: none !important; }
    .ds-svg-lane-group.lane-standard { color: #1d4ed8; }
    .ds-svg-lane-group.lane-drop { color: #a78bfa; }
    .ds-svg-lane-group.lane-flat { color: #14b8a6; }
    .ds-svg-lane-group.lane-sprint { color: #10b981; }
    .ds-svg-lane-group.lane-marathon { color: #f59e0b; }
    .ds-svg-act { fill: currentColor; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="output"></div>

  <script src="/screen.js"></script>
  <script>
    // Mock window.slopsmith for testing
    window.slopsmith = {
      on: function() {},
      emit: function() {}
    };

    // Expose test helper
    window.renderMap = function(data) {
      const result = window.dsMapView(data);
      document.getElementById('output').innerHTML = result;
      return result;
    };

    window.renderSongCard = function(song, index, isBlindside) {
      const result = window.dsSongCard(song, index, isBlindside);
      document.getElementById('output').innerHTML = result;
      return result;
    };

    console.log('Map render test page loaded');
  </script>
</body>
</html>
