<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Render Test Harness</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
    .hidden { display: none !important; }
    .pass { color: #10b981; }
    .fail { color: #ef4444; }
    .test-section { margin: 20px 0; padding: 15px; border: 1px solid #333; border-radius: 8px; }
    .test-result { margin: 5px 0; padding: 5px; }
    #output { margin-top: 20px; }
    h1 { color: #60a5fa; }
    h2 { color: #a78bfa; margin-top: 20px; }
    .summary { font-size: 1.2em; font-weight: bold; margin: 20px 0; padding: 10px; border-radius: 8px; }
    .summary.pass { background: #10b98120; border: 1px solid #10b981; }
    .summary.fail { background: #ef444420; border: 1px solid #ef4444; }
  </style>
</head>
<body>
  <h1>Map Render Test Harness</h1>
  <div id="results"></div>
  <div id="output" class="hidden"></div>

  <script src="../../screen.js"></script>
  <script>
    // Mock window.slopsmith for testing
    window.slopsmith = {
      on: function() {},
      emit: function() {}
    };

    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    function assert(condition, message) {
      const div = document.createElement('div');
      div.className = 'test-result ' + (condition ? 'pass' : 'fail');
      div.textContent = (condition ? '✓ PASS' : '✗ FAIL') + ': ' + message;
      results.appendChild(div);
      if (condition) passed++; else failed++;
      return condition;
    }

    function renderAndTest(label, data) {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = label;
      section.appendChild(h2);
      results.appendChild(section);

      const html = window.dsMapView(data);
      document.getElementById('output').innerHTML = html;
      return html;
    }

    // Test 1: Icon Mapping
    (function testIconMapping() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 1: Icon Mapping';
      section.appendChild(h2);
      results.appendChild(section);

      const tests = [
        { type: 'forced', expected: '🎸' },
        { type: 'elite', expected: '⚔️' },
        { type: 'treasure', expected: '💎' },
        { type: 'rest', expected: '🛌' },
        { type: 'shop', expected: '🏪' },
        { type: 'choice', expected: '◇' },
        { type: 'mystery', expected: '?' },
        { type: 'boss', expected: '👑' },
        { type: 'unknown', expected: '●' },
        { type: undefined, expected: '●' },
        { type: null, expected: '●' },
      ];

      tests.forEach(t => {
        const node = { type: t.type };
        const icon = window.dsNodeIcon(node);
        assert(icon === t.expected, `dsNodeIcon({type: "${t.type}"}}) should return "${t.expected}", got "${icon}"`);
      });
    })();

    // Test 2: Act Labels Presence
    (function testActLabels() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 2: Act Labels Presence';
      section.appendChild(h2);
      results.appendChild(section);

      // Test with act label
      const dataWithAct = {
        date: '2026-04-26',
        map: {
          nodes: [
            { id: 'n1', type: 'forced', lane: 'standard', col: 0, row: 0, act: 'Intro' },
            { id: 'n2', type: 'rest', lane: 'standard', col: 1, row: 0, act: 'Act 1' },
          ],
          edges: [{ from: 'n1', to: 'n2' }],
          lanes: { standard: '' }
        },
        songs: [],
        available_node_ids: ['n1', 'n2'],
        cleared_node_ids: [],
        locked_node_ids: []
      };

      const htmlWithAct = renderAndTest('Act Labels - With Acts', dataWithAct);
      assert(htmlWithAct.includes('Intro'), 'Should contain "Intro" act label');
      assert(htmlWithAct.includes('Act 1'), 'Should contain "Act 1" act label');
      assert(htmlWithAct.includes('ds-svg-act'), 'Should have ds-svg-act class for act labels');

      // Test without act label
      const dataWithoutAct = JSON.parse(JSON.stringify(dataWithAct));
      dataWithoutAct.map.nodes[0].act = undefined;
      dataWithoutAct.map.nodes[1].act = null;
      const htmlWithoutAct = window.dsMapView(dataWithoutAct);
      assert(!htmlWithoutAct.includes('ds-svg-act'), 'Should NOT have ds-svg-act class when no acts');
    })();

    // Test 3: Lane Classes
    (function testLaneClasses() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 3: Lane Classes';
      section.appendChild(h2);
      results.appendChild(section);

      const laneTests = [
        { lane: 'standard', shouldHave: 'lane-standard' },
        { lane: 'drop', shouldHave: 'lane-drop' },
        { lane: 'flat', shouldHave: 'lane-flat' },
        { lane: 'sprint', shouldHave: 'lane-sprint' },
        { lane: 'marathon', shouldHave: 'lane-marathon' },
        { lane: undefined, shouldHave: 'lane-standard' }, // default
        { lane: 'unknown', shouldHave: 'lane-unknown' },
      ];

      laneTests.forEach(t => {
        const data = {
          date: '2026-04-26',
          map: {
            nodes: [
              { id: 'n1', type: 'forced', lane: t.lane, col: 0, row: 0 },
            ],
            edges: [],
            lanes: {}
          },
          songs: [],
          available_node_ids: ['n1'],
          cleared_node_ids: [],
          locked_node_ids: []
        };

        const html = window.dsMapView(data);
        assert(html.includes(`lane-${t.lane || 'standard'}`), `Node with lane="${t.lane}" should have class "lane-${t.lane || 'standard'}", got: ${html.substring(0, 200)}`);
        assert(html.includes('ds-svg-lane-group'), 'Should have ds-svg-lane-group class');
        assert(html.includes('data-lane='), 'Should have data-lane attribute');
      });
    })();

    // Test 4: Node States (cleared, available, locked, future)
    (function testNodeStates() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 4: Node States';
      section.appendChild(h2);
      results.appendChild(section);

      const data = {
        date: '2026-04-26',
        map: {
          nodes: [
            { id: 'n1', type: 'forced', lane: 'standard', col: 0, row: 0 },
            { id: 'n2', type: 'rest', lane: 'standard', col: 1, row: 0 },
            { id: 'n3', type: 'elite', lane: 'drop', col: 2, row: 0 },
            { id: 'n4', type: 'boss', lane: 'standard', col: 3, row: 0 },
          ],
          edges: [
            { from: 'n1', to: 'n2' },
            { from: 'n2', to: 'n3' },
            { from: 'n3', to: 'n4' }
          ],
          lanes: { standard: '', drop: '' }
        },
        songs: [],
        available_node_ids: ['n1', 'n2'],
        cleared_node_ids: ['n1'],
        locked_node_ids: ['n3', 'n4']
      };

      const html = window.dsMapView(data);
      assert(html.includes('cursor:pointer'), 'Available/cleared nodes should have cursor:pointer');
      assert(html.includes('#14532d'), 'Cleared nodes should have green fill');
      assert(html.includes('#1d4ed8'), 'Available nodes should have blue fill');
      assert(html.includes('#111827'), 'Locked nodes should have dark fill');
    })();

    // Test 5: Lane Label
    (function testLaneLabel() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 5: Lane Label Function';
      section.appendChild(h2);
      results.appendChild(section);

      const tests = [
        { input: 'standard', expected: 'Standard' },
        { input: 'drop', expected: 'Drop' },
        { input: 'flat', expected: 'Flat' },
        { input: 'sprint', expected: 'Sprint' },
        { input: 'marathon', expected: 'Marathon' },
        { input: 'daily', expected: 'Daily' },
        { input: undefined, expected: '' },
        { input: null, expected: '' },
        { input: 'decade_1980s', expected: '1980s' },
        { input: 'some_lane', expected: 'some lane' },
      ];

      tests.forEach(t => {
        const result = window.dsLaneLabel(t.input);
        assert(result === t.expected, `dsLaneLabel("${t.input}") should return "${t.expected}", got "${result}"`);
      });
    })();

    // Test 6: SVG Structure
    (function testSvgStructure() {
      const section = document.createElement('div');
      section.className = 'test-section';
      const h2 = document.createElement('h2');
      h2.textContent = 'Test 6: SVG Structure';
      section.appendChild(h2);
      results.appendChild(section);

      const data = {
        date: '2026-04-26',
        map: {
          nodes: [
            { id: 'n1', type: 'forced', lane: 'standard', col: 0, row: 0 },
            { id: 'n2', type: 'rest', lane: 'drop', col: 1, row: 1 },
          ],
          edges: [{ from: 'n1', to: 'n2' }],
          lanes: { standard: '', drop: '' }
        },
        songs: [],
        available_node_ids: ['n1', 'n2'],
        cleared_node_ids: [],
        locked_node_ids: []
      };

      const html = window.dsMapView(data);
      assert(html.includes('<svg'), 'Should contain SVG element');
      assert(html.includes('<line'), 'Should contain line elements for edges');
      assert(html.includes('<circle'), 'Should contain circle elements for nodes');
      assert(html.includes('<text'), 'Should contain text elements for labels');
      assert(html.includes('viewBox='), 'Should have viewBox attribute');
    })();

    // Summary
    (function showSummary() {
      const summary = document.createElement('div');
      summary.className = 'summary ' + (failed === 0 ? 'pass' : 'fail');
      summary.textContent = `Tests complete: ${passed} passed, ${failed} failed, ${passed + failed} total`;
      results.insertBefore(summary, results.firstChild);
    })();
  </script>
</body>
</html>
